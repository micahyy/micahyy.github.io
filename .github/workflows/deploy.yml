name: Deploy to ECS

on:
  push:
    branches:
      - main  # 如果你的默认分支是 master，改成 master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to ECS
        run: |
          rsync -avz --delete ./ ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:${{ secrets.ECS_PATH }}
      
      - name: Restart Python server (optional)
        run: |
          ssh ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} "pkill -f 'python3 -m http.server' || true"
          ssh ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} "cd ${{ secrets.ECS_PATH }} && nohup python3 -m http.server 8080 > /tmp/web.log 2>&1 &"
